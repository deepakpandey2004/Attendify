<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Attendance</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Attendify — Face-verified smart attendance with geolocation tracking." />
    <meta name="theme-color" content="#6366f1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="min-h-screen bg-gray-900 text-white p-4">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-4">
            <a href="/dashboard" class="text-white/70 hover:text-white">
                <i class="fas fa-arrow-left text-xl"></i>
            </a>
            <div>
                <h1 id="page-title" class="text-xl font-bold">Mark Attendance</h1>
                <p id="page-subtitle" class="text-sm text-white/60"></p>
            </div>
        </div>

        <!-- Camera -->
        <div class="relative bg-black rounded-xl overflow-hidden mb-4 shadow-2xl" style="aspect-ratio: 4/3;">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="canvas" class="hidden w-full h-full object-cover absolute inset-0"></canvas>

            <div id="camera-loading" class="absolute inset-0 flex items-center justify-center bg-black text-white">
                <div class="text-center">
                    <i class="fas fa-camera text-5xl mb-3 opacity-70 animate-pulse"></i>
                    <p>Starting camera & getting location...</p>
                </div>
            </div>

            <div id="face-guide" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-56 h-72 border-4 border-white/50 rounded-full"></div>
            </div>

            <!-- Live info overlay (only in video mode) -->
            <div id="live-info" class="hidden absolute bottom-3 left-3 right-3 bg-black/60 backdrop-blur p-2 rounded text-xs font-mono">
                <p><i class="fas fa-clock"></i> <span id="live-time"></span></p>
                <p><i class="fas fa-location-dot"></i> <span id="live-location">Fetching location...</span></p>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3">
            <button id="capture-btn"
                class="flex-1 bg-white text-gray-900 py-4 rounded-xl font-bold hover:bg-gray-100 transition flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-camera"></i>
                Capture
            </button>
            <button id="retake-btn" class="hidden flex-1 bg-gray-700 text-white py-4 rounded-xl font-bold hover:bg-gray-600 transition flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-redo"></i>
                Retake
            </button>
            <button id="submit-btn" class="hidden flex-1 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-check"></i>
                <span id="submit-btn-text">Submit</span>
            </button>
        </div>

        <p class="text-xs text-white/60 text-center mt-4">
            <i class="fas fa-shield-halved"></i>
            Only live camera photos are accepted. Gallery access is disabled.
        </p>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/camera.js"></script>
    <script src="/js/attendance.js"></script>
</body>
</html>
