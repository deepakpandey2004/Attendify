<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Attendance — Attendify</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
        body { background: var(--gray-900); color: white; min-height: 100vh; margin: 0; }
        .capture-wrap { max-width: 640px; margin: 0 auto; padding: 16px; }
        .cap-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .cap-back {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; transition: background 0.15s;
        }
        .cap-back:hover { background: rgba(255,255,255,0.15); }
        .cap-title { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
        .cap-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 2px; margin-bottom: 0; }

        .camera-box {
            position: relative;
            background: black;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 14px;
            max-height: 50vh;
            aspect-ratio: 4/3;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        }
        .camera-box video, .camera-box canvas {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .camera-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #000; color: white;
        }
        .face-guide-oval {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .face-guide-oval::before {
            content: ''; width: 200px; height: 260px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .live-info-panel {
            position: absolute; bottom: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border-radius: 8px; padding: 8px 10px;
            font-size: 12px;
        }
        .live-info-panel .info-row {
            display: flex; align-items: flex-start; gap: 6px;
            margin-bottom: 3px;
        }
        .live-info-panel .info-row:last-child { margin-bottom: 0; }
        .live-info-panel svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 2px; }

        .action-buttons {
            display: flex; gap: 10px;
        }
        .action-btn-large {
            flex: 1;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 15px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            gap: 8px; border: none; cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .action-btn-large svg { width: 18px; height: 18px; }
        .btn-capture-lg { background: white; color: #0f172a; }
        .btn-capture-lg:hover { background: #e2e8f0; }
        .btn-retake-lg {
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-retake-lg:hover { background: rgba(255,255,255,0.2); }
        .btn-submit-lg { background: #10b981; color: white; }
        .btn-submit-lg:hover { background: #059669; }
        .btn-submit-lg:disabled { opacity: 0.6; cursor: not-allowed; }

        .security-note {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-top: 14px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
    </style>
</head>

<body>
    <div class="capture-wrap">
        <div class="cap-header">
            <a href="/dashboard" class="cap-back">
                <i data-lucide="arrow-left" style="width:18px;height:18px;"></i>
            </a>
            <div style="flex:1;">
                <h1 id="page-title" class="cap-title">Mark Attendance</h1>
                <p id="page-subtitle" class="cap-sub"></p>
            </div>
            <div id="action-icon" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;"></div>
        </div>

        <div class="camera-box">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;position:absolute;inset:0;"></canvas>

            <div id="camera-loading" class="camera-loading">
                <div style="text-align:center;">
                    <i data-lucide="video" style="width:44px;height:44px;opacity:0.7;margin-bottom:10px;"></i>
                    <p style="font-size:13px;">Starting camera &amp; getting location...</p>
                </div>
            </div>

            <div id="face-guide" class="face-guide-oval" style="display:none;"></div>

            <div id="live-info" class="live-info-panel" style="display:none;">
                <div class="info-row">
                    <i data-lucide="clock"></i>
                    <span id="live-time" style="font-family:monospace;font-weight:600;"></span>
                </div>
                <div class="info-row">
                    <i data-lucide="map-pin"></i>
                    <span id="live-location" style="line-height:1.4;">Fetching location...</span>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button id="capture-btn" class="action-btn-large btn-capture-lg">
                <i data-lucide="camera"></i>
                Capture
            </button>
            <button id="retake-btn" class="action-btn-large btn-retake-lg" style="display:none;">
                <i data-lucide="rotate-ccw"></i>
                Retake
            </button>
            <button id="submit-btn" class="action-btn-large btn-submit-lg" style="display:none;">
                <i data-lucide="check"></i>
                <span id="submit-btn-text">Submit</span>
            </button>
        </div>

        <p class="security-note">
            <i data-lucide="shield-check" style="width:13px;height:13px;"></i>
            Only live camera photos accepted. Gallery access is disabled.
        </p>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/camera.js"></script>
    <script src="/js/attendance.js"></script>
</body>
</html>
