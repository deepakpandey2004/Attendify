<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance — Attendify</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Attendify — Face-verified smart attendance with geolocation tracking." />
    <meta name="theme-color" content="#6366f1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>

        <div class="main-content">
            <div id="topbar-container"></div>

            <div class="page-content">
                <!-- Page Header -->
                <div style="margin-bottom: 24px;">
                    <h2 style="font-size:24px; font-weight:700; color:var(--gray-900); letter-spacing:-0.02em; margin:0;">
                        Attendance History
                    </h2>
                    <p style="color:var(--gray-500); font-size:14px; margin-top:4px;">
                        View your complete attendance record with detailed insights
                    </p>
                </div>

                <!-- Stats Grid -->
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; margin-bottom:24px;">
                    <div class="stat-card">
                        <div class="stat-icon indigo"><i data-lucide="calendar-days"></i></div>
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="stat-total">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i data-lucide="check-circle-2"></i></div>
                        <div class="stat-label">Full Days</div>
                        <div class="stat-value" id="stat-full">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow"><i data-lucide="clock-alert"></i></div>
                        <div class="stat-label">Half Days</div>
                        <div class="stat-value" id="stat-half">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i data-lucide="user-x"></i></div>
                        <div class="stat-label">Leaves</div>
                        <div class="stat-value" id="stat-leaves">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon cyan"><i data-lucide="trending-up"></i></div>
                        <div class="stat-label">Attendance</div>
                        <div class="stat-value" id="stat-pct">—</div>
                    </div>
                </div>

                <!-- Records Card -->
                <div class="card">
                    <div class="card-header">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <i data-lucide="list" style="width:18px; height:18px; color:var(--brand-600);"></i>
                            <span class="card-title">All Records</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:16px;">
                            <!-- Legend -->
                            <div style="display:flex; align-items:center; gap:14px; font-size:12px; color:var(--gray-600);">
                                <div style="display:flex; align-items:center; gap:5px;">
                                    <span class="status-dot dot-full" style="width:8px; height:8px; box-shadow:none;"></span>
                                    <span>Full</span>
                                </div>
                                <div style="display:flex; align-items:center; gap:5px;">
                                    <span class="status-dot dot-half" style="width:8px; height:8px; box-shadow:none;"></span>
                                    <span>Half</span>
                                </div>
                                <div style="display:flex; align-items:center; gap:5px;">
                                    <span class="status-dot dot-active" style="width:8px; height:8px; box-shadow:none;"></span>
                                    <span>Active</span>
                                </div>
                                <div style="display:flex; align-items:center; gap:5px;">
                                    <span class="status-dot dot-leave" style="width:8px; height:8px; box-shadow:none;"></span>
                                    <span>Leave</span>
                                </div>
                            </div>
                            <span id="record-count" style="font-size:12px; color:var(--gray-500); padding-left:16px; border-left:1px solid var(--gray-200);"></span>
                        </div>
                    </div>
                    <div id="records-container">
                        <div style="padding:40px; text-align:center;">
                            <div class="skeleton" style="height:60px; margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:60px; margin-bottom:8px;"></div>
                            <div class="skeleton" style="height:60px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.6); z-index:60; align-items:center; justify-content:center; padding:16px;">
        <div style="background:white; border-radius:14px; max-width:640px; width:100%; max-height:90vh; overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow-xl);">
            <div style="padding:18px 22px; border-bottom:1px solid var(--gray-100); display:flex; align-items:center; justify-content:space-between;">
                <div>
                    <div id="modal-title" style="font-weight:700; color:var(--gray-900); font-size:16px;"></div>
                    <div id="modal-subtitle" style="font-size:12px; color:var(--gray-500); margin-top:2px;"></div>
                </div>
                <button class="icon-btn" id="close-modal"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-body" style="overflow-y:auto; flex:1; padding:22px;"></div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/layout.js"></script>
    <script src="/js/history.js"></script>
</body>
</html>
